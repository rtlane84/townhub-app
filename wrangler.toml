# Cloudflare Pages — frontend static site
#
# Dashboard (Workers & Pages → your project → Settings → Builds):
#   Root directory:     (leave empty — repo root)
#   Build command:      pnpm --filter @workspace/townhub run build
#   Build output dir:   artifacts/townhub/dist/public
#   Deploy command:     npx wrangler pages deploy
#     (NOT `npx wrangler deploy` — that is Workers and fails in this monorepo)
#
# Auth (required for deploy command):
#   CLOUDFLARE_API_TOKEN  — Custom token with Account → Cloudflare Pages → Edit
#                           (+ Account Settings Read, User Details Read)
#   CLOUDFLARE_ACCOUNT_ID — optional; from dash or wrangler whoami
#
# Env (build-time):
#   NODE_VERSION=22
#   VITE_CLERK_PUBLISHABLE_KEY=...
#   VITE_API_BASE_URL=https://your-api.example.com
#
# If auto `pnpm install --frozen-lockfile` fails with LOCKFILE_CONFIG_MISMATCH:
#   SKIP_DEPENDENCY_INSTALL=true
#   Build command: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/townhub run build
#
# Manual / CI upload (optional):
#   npx wrangler pages deploy artifacts/townhub/dist/public --project-name=townhub

name = "townhub"
compatibility_date = "2026-07-09"

# Required for `wrangler pages deploy` (reads output dir + project name from here).
pages_build_output_dir = "artifacts/townhub/dist/public"
