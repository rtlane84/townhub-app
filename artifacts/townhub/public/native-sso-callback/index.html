<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Returning to TownHub…</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #faf8f5;
        color: #2c241c;
        padding: 24px;
        text-align: center;
      }
      a {
        color: #1e3a5f;
      }
      .hint {
        margin-top: 12px;
        font-size: 13px;
        color: #6b635b;
      }
      .err {
        color: #b42318;
        font-size: 14px;
      }
    </style>
    <script>
      (function () {
        // Legacy Cap Browser path. Prefer townhub:// redirect_url so Clerk sends
        // rotating_token_nonce. Only bounce when Clerk params are present —
        // bare townhub:// is worse than showing an error (AuthSession captures it).
        var payload = location.search + location.hash;
        var hasParams =
          payload &&
          payload !== "?" &&
          payload !== "#" &&
          /(rotating_token_nonce|__clerk_status)/i.test(payload);

        if (!hasParams) {
          document.addEventListener("DOMContentLoaded", function () {
            var hint = document.querySelector(".hint");
            if (hint) {
              hint.className = "err";
              hint.textContent =
                "Missing Clerk sign-in parameters. Close this window and use the latest TownHub build (native townhub:// redirect).";
            }
          });
          return;
        }

        var deepLink =
          "townhub://oauth/sso-callback/p/" + encodeURIComponent(payload);

        function setLink() {
          var openLink = document.getElementById("open-app");
          if (openLink) openLink.setAttribute("href", deepLink);
        }
        setLink();
        location.replace(deepLink);
        window.addEventListener("DOMContentLoaded", setLink);
      })();
    </script>
  </head>
  <body>
    <div>
      <p>Returning to TownHub…</p>
      <p><a id="open-app" href="townhub://oauth/sso-callback">Tap here if the app doesn’t open</a></p>
      <p class="hint">If this screen stays open, tap the link above.</p>
    </div>
  </body>
</html>
