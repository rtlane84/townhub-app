<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Returning to TownHub…</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #faf8f5;
        color: #2c241c;
        padding: 24px;
        text-align: center;
      }
      a {
        color: #1e3a5f;
      }
      .hint {
        margin-top: 12px;
        font-size: 13px;
        color: #6b635b;
      }
    </style>
    <script>
      (function () {
        // Clerk lands here over HTTPS (custom schemes are rejected). Bounce to
        // townhub:// so ASWebAuthenticationSession can capture the full URL
        // (path-encoded — Cap Browser used to strip query strings).
        var payload = location.search + location.hash;
        var deepLink =
          payload && payload !== "?" && payload !== "#"
            ? "townhub://oauth/sso-callback/p/" + encodeURIComponent(payload)
            : "townhub://oauth/sso-callback";

        function setLink() {
          var openLink = document.getElementById("open-app");
          if (openLink) openLink.setAttribute("href", deepLink);
        }
        setLink();
        location.replace(deepLink);
        window.addEventListener("DOMContentLoaded", setLink);
      })();
    </script>
  </head>
  <body>
    <div>
      <p>Returning to TownHub…</p>
      <p><a id="open-app" href="townhub://oauth/sso-callback">Tap here if the app doesn’t open</a></p>
      <p class="hint">If this screen stays open, tap the link above.</p>
    </div>
  </body>
</html>
