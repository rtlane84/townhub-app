<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Returning to TownHub…</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #faf8f5;
        color: #2c241c;
        padding: 24px;
        text-align: center;
      }
      a {
        color: #1e3a5f;
      }
    </style>
    <script>
      (function () {
        // Static bounce — no React. Works even before the SPA bundle loads.
        // Preserves Clerk OAuth query/hash for the WebView /sso-callback handler.
        var deepLink = "townhub://sso-callback" + location.search + location.hash;
        location.replace(deepLink);
        window.addEventListener("DOMContentLoaded", function () {
          var link = document.getElementById("open-app");
          if (link) link.setAttribute("href", deepLink);
        });
      })();
    </script>
  </head>
  <body>
    <div>
      <p>Returning to TownHub…</p>
      <p><a id="open-app" href="townhub://sso-callback">Tap here if the app doesn’t open</a></p>
    </div>
  </body>
</html>
