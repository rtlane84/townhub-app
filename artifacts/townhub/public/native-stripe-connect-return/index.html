<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Returning to TownHub…</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #faf8f5;
        color: #2c241c;
        padding: 24px;
        text-align: center;
      }
      a {
        color: #1e3a5f;
      }
      .hint {
        margin-top: 12px;
        font-size: 13px;
        color: #6b635b;
      }
    </style>
    <script>
      (function () {
        // Stripe Account Links require HTTPS return URLs. Bounce into the Cap
        // app via townhub://, then fall back to the web Settings page.
        var params = new URLSearchParams(location.search);
        var businessId = params.get("businessId") || "";
        var qs = new URLSearchParams();
        qs.set("stripe", "return");
        if (businessId) qs.set("businessId", businessId);
        var search = "?" + qs.toString();
        var path = "/dashboard/business/settings" + search;
        var deepLink = "townhub:/" + path;
        var webUrl = location.origin + path;

        function setLink() {
          var openLink = document.getElementById("open-app");
          if (openLink) openLink.setAttribute("href", deepLink);
        }
        setLink();
        location.replace(deepLink);
        window.setTimeout(function () {
          location.replace(webUrl);
        }, 600);
        window.addEventListener("DOMContentLoaded", setLink);
      })();
    </script>
  </head>
  <body>
    <div>
      <p>Returning to TownHub…</p>
      <p><a id="open-app" href="townhub://dashboard/business/settings?stripe=return">Tap here if the app doesn’t open</a></p>
      <p class="hint">If this screen stays open, tap the link above.</p>
    </div>
  </body>
</html>
