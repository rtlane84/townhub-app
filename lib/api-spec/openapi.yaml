openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LocalOrderHub - Multi-tenant local marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: businesses
    description: Business directory operations
  - name: products
    description: Product catalog operations
  - name: categories
    description: Category management
  - name: orders
    description: Order management
  - name: cart
    description: Cart operations
  - name: auth
    description: Authentication / user profile
  - name: admin
    description: Platform admin operations
  - name: events
    description: Community events calendar
  - name: highlights
    description: Seasonal highlights and promotions
  - name: subscriptions
    description: Subscription plans and billing
  - name: food-truck
    description: Food truck location management
  - name: media
    description: Media library and image uploads

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth / User ───────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /auth/me/business:
    get:
      operationId: getMyBusiness
      tags: [auth]
      summary: Get the business owned by the current user
      responses:
        "200":
          description: My business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "404":
          description: No business found

  # ─── Businesses (public) ────────────────────────────────────────
  /businesses:
    get:
      operationId: listBusinesses
      tags: [businesses]
      summary: List all active businesses
      parameters:
        - in: query
          name: type
          schema:
            type: string
          description: Filter by business type
        - in: query
          name: search
          schema:
            type: string
          description: Search by business name
        - in: query
          name: featured
          schema:
            type: boolean
          description: Filter featured businesses only
      responses:
        "200":
          description: List of businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  /businesses/stats:
    get:
      operationId: getPlatformStats
      tags: [businesses]
      summary: Platform-level stats (admin)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /businesses/{slug}:
    get:
      operationId: getBusinessBySlug
      tags: [businesses]
      summary: Get a single business storefront by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Business storefront
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessStorefront"
        "404":
          description: Not found

  # ─── Self-service business registration ────────────────────────
  /businesses/register:
    post:
      operationId: registerBusiness
      tags: [businesses]
      summary: Self-service business registration (any authenticated user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessRegistrationInput"
      responses:
        "201":
          description: Business created and user promoted to BUSINESS_OWNER
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  # ─── Business Admin (owner/admin) ──────────────────────────────
  /businesses/manage:
    post:
      operationId: createBusiness
      tags: [businesses]
      summary: Create a new business (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /businesses/manage/{id}:
    get:
      operationId: getBusiness
      tags: [businesses]
      summary: Get a business by id (owner or admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    patch:
      operationId: updateBusiness
      tags: [businesses]
      summary: Update business settings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessUpdate"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    delete:
      operationId: deleteBusiness
      tags: [businesses]
      summary: Delete/disable a business (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Categories ─────────────────────────────────────────────────
  /businesses/{businessId}/categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories for a business
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /businesses/{businessId}/categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Products ───────────────────────────────────────────────────
  /businesses/{businessId}/products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products for a business
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /businesses/{businessId}/products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Orders ─────────────────────────────────────────────────────
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /businesses/{businessId}/orders:
    get:
      operationId: listBusinessOrders
      tags: [orders]
      summary: List orders for a specific business
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /businesses/{businessId}/orders/summary:
    get:
      operationId: getBusinessOrderSummary
      tags: [orders]
      summary: Get today's order summary/stats for a business
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessOrderSummary"

  /admin/orders:
    get:
      operationId: listAllOrders
      tags: [admin]
      summary: List all orders (admin)
      parameters:
        - in: query
          name: businessId
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: date
          schema:
            type: string
            format: date
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  # ─── Checkout / Stripe ──────────────────────────────────────────
  /checkout/session:
    post:
      operationId: createCheckoutSession
      tags: [orders]
      summary: Create a Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutSessionInput"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResult"

  /checkout/webhook:
    post:
      operationId: stripeWebhook
      tags: [orders]
      summary: Stripe webhook handler
      responses:
        "200":
          description: Received

  # ─── Appointment Requests (Salon) ───────────────────────────────
  /appointment-requests:
    post:
      operationId: createAppointmentRequest
      tags: [appointments]
      summary: Submit a salon appointment request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentRequestInput"
      responses:
        "201":
          description: Appointment request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentRequest"

  /businesses/{businessId}/appointment-requests:
    get:
      operationId: listBusinessAppointmentRequests
      tags: [appointments]
      summary: List appointment requests for a business (owner)
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentRequest"

  # ─── Admin: Users ───────────────────────────────────────────────
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /admin/users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Update a user role (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /admin/businesses/{id}/assign-owner:
    patch:
      operationId: assignBusinessOwner
      tags: [admin]
      summary: Assign a business owner (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessOwnerAssignment"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  # ─── Events ────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List active events
      parameters:
        - in: query
          name: featured
          schema:
            type: boolean
        - in: query
          name: upcoming
          schema:
            type: boolean
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    put:
      operationId: updateEvent
      tags: [events]
      summary: Update an event (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Highlights ────────────────────────────────────────────────
  /highlights:
    get:
      operationId: listHighlights
      tags: [highlights]
      summary: List active highlights
      responses:
        "200":
          description: List of highlights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Highlight"
    post:
      operationId: createHighlight
      tags: [highlights]
      summary: Create a highlight (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HighlightInput"
      responses:
        "201":
          description: Created highlight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Highlight"

  /highlights/{id}:
    get:
      operationId: getHighlight
      tags: [highlights]
      summary: Get a single highlight
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Highlight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Highlight"
    put:
      operationId: updateHighlight
      tags: [highlights]
      summary: Update a highlight (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HighlightInput"
      responses:
        "200":
          description: Updated highlight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Highlight"
    delete:
      operationId: deleteHighlight
      tags: [highlights]
      summary: Delete a highlight (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Subscription Plans ─────────────────────────────────────────
  /admin/subscription-plans:
    get:
      operationId: listSubscriptionPlans
      tags: [subscriptions]
      summary: List all subscription plans (admin)
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlan"
    post:
      operationId: createSubscriptionPlan
      tags: [subscriptions]
      summary: Create a subscription plan (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPlanInput"
      responses:
        "201":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlan"

  /admin/subscription-plans/{id}:
    put:
      operationId: updateSubscriptionPlan
      tags: [subscriptions]
      summary: Update a subscription plan (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPlanInput"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlan"
    delete:
      operationId: deleteSubscriptionPlan
      tags: [subscriptions]
      summary: Delete a subscription plan (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/businesses/{id}/subscription:
    get:
      operationId: getBusinessSubscription
      tags: [subscriptions]
      summary: Get subscription for a business (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessSubscription"
    put:
      operationId: upsertBusinessSubscription
      tags: [subscriptions]
      summary: Set or update a business subscription (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessSubscriptionInput"
      responses:
        "200":
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessSubscription"

  /businesses/{id}/subscription:
    get:
      operationId: getMySubscription
      tags: [subscriptions]
      summary: Get my business subscription (business owner)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessSubscription"
        "404":
          description: No subscription

  # ─── Food Truck Locations ───────────────────────────────────────
  /businesses/{id}/food-truck-locations:
    get:
      operationId: listFoodTruckLocations
      tags: [food-truck]
      summary: List food truck location schedule for a business
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodTruckLocation"
    post:
      operationId: createFoodTruckLocation
      tags: [food-truck]
      summary: Add a food truck location entry (business owner)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodTruckLocationInput"
      responses:
        "201":
          description: Created location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodTruckLocation"

  /businesses/{id}/food-truck-locations/{locationId}:
    put:
      operationId: updateFoodTruckLocation
      tags: [food-truck]
      summary: Update a food truck location (business owner)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: locationId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodTruckLocationInput"
      responses:
        "200":
          description: Updated location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodTruckLocation"
    delete:
      operationId: deleteFoodTruckLocation
      tags: [food-truck]
      summary: Delete a food truck location (business owner)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: locationId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Public food truck schedule ─────────────────────────────────
  /food-truck-locations/today:
    get:
      operationId: listTodayFoodTrucks
      tags: [food-truck]
      summary: List today's active food truck locations (public)
      responses:
        "200":
          description: Today's food truck locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FoodTruckLocationWithBusiness"

  # ─── Platform Theme Settings ──────────────────────────────────────
  /admin/settings/theme:
    get:
      operationId: getPlatformTheme
      tags: [admin]
      summary: Get platform-wide theme settings (public read)
      responses:
        "200":
          description: Platform theme settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTheme"
    put:
      operationId: updatePlatformTheme
      tags: [admin]
      summary: Update platform-wide theme settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformThemeInput"
      responses:
        "200":
          description: Updated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTheme"

  # ─── Notification Logs ────────────────────────────────────────────
  /admin/notification-logs:
    get:
      operationId: listNotificationLogs
      tags: [admin]
      summary: List notification logs for dev inspection (admin only)
      parameters:
        - in: query
          name: orderId
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Notification log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationLog"

  # ─── Media Library ────────────────────────────────────────────────
  /media:
    get:
      operationId: listMediaAssets
      tags: [media]
      summary: List uploaded media for the current user scope
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Media assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaAsset"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /media/upload:
    post:
      operationId: uploadMediaAsset
      tags: [media]
      summary: Upload an image to the media library
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MediaUploadForm"
      responses:
        "201":
          description: Uploaded media asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "400":
          description: Invalid upload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "413":
          description: File too large

  /media/{id}:
    delete:
      operationId: deleteMediaAsset
      tags: [media]
      summary: Delete a media asset from the library
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

