components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ServiceHealthStatus:
      type: string
      enum: [healthy, warning, unavailable, not_configured]

    SystemHealthStatus:
      type: string
      enum: [healthy, warning, error]

    ServiceHealth:
      type: object
      required: [name, status, message]
      properties:
        name:
          type: string
        status:
          $ref: "#/components/schemas/ServiceHealthStatus"
        message:
          type: string
        responseTimeMs:
          type: number
        metadata:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean

    ApplicationHealth:
      type: object
      required: [name, environment, environmentLabel, apiVersion, uptimeSeconds, timestamp, startTime, appBaseUrlConfigured]
      properties:
        name:
          type: string
        environment:
          type: string
        environmentLabel:
          type: string
        version:
          type: string
        apiVersion:
          type: string
        buildDate:
          type: string
        commitSha:
          type: string
        appBaseUrlConfigured:
          type: boolean
        uptimeSeconds:
          type: number
        timestamp:
          type: string
          format: date-time
        startTime:
          type: string
          format: date-time

    ApiErrorLogEntry:
      type: object
      required: [id, timestamp, endpoint, httpStatus, summary]
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        endpoint:
          type: string
        httpStatus:
          type: integer
        summary:
          type: string
        exceptionMessage:
          type: string
        requestId:
          type: string
        userId:
          type: string
        userLabel:
          type: string
        businessId:
          type: integer
        businessName:
          type: string
        stackTrace:
          type: string

    PlatformActivityEntry:
      type: object
      required: [id, type, title, timestamp]
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        detail:
          type: string
        timestamp:
          type: string
          format: date-time
        actorLabel:
          type: string
        businessId:
          type: integer
        businessName:
          type: string

    PlatformMetrics:
      type: object
      required:
        - activeBusinesses
        - pendingApplications
        - activeSubscriptions
        - trialSubscriptions
        - pastDueSubscriptions
        - ordersToday
        - ordersThisMonth
        - emailsSentToday
        - failedEmailsToday
        - smsSentToday
        - failedSmsToday
      properties:
        activeBusinesses:
          type: integer
        pendingApplications:
          type: integer
        activeSubscriptions:
          type: integer
        trialSubscriptions:
          type: integer
        pastDueSubscriptions:
          type: integer
        ordersToday:
          type: integer
        ordersThisMonth:
          type: integer
        emailsSentToday:
          type: integer
        failedEmailsToday:
          type: integer
        smsSentToday:
          type: integer
        failedSmsToday:
          type: integer
        revenueToday:
          type: ["number", "null"]
        revenueThisMonth:
          type: ["number", "null"]

    PlatformHealthSummary:
      type: object
      required:
        - overallStatus
        - apiErrorsLast24h
      properties:
        overallStatus:
          $ref: "#/components/schemas/SystemHealthStatus"
        activeBusinesses:
          type: ["integer", "null"]
        pendingApplications:
          type: ["integer", "null"]
        activeSubscriptions:
          type: ["integer", "null"]
        trialSubscriptions:
          type: ["integer", "null"]
        pastDueSubscriptions:
          type: ["integer", "null"]
        ordersToday:
          type: ["integer", "null"]
        emailsSentToday:
          type: ["integer", "null"]
        failedEmailsToday:
          type: ["integer", "null"]
        apiErrorsLast24h:
          type: integer

    SystemHealthReport:
      type: object
      required: [status, timestamp, application, summary, services, apiErrors, recentActivity]
      properties:
        status:
          $ref: "#/components/schemas/SystemHealthStatus"
        timestamp:
          type: string
          format: date-time
        application:
          $ref: "#/components/schemas/ApplicationHealth"
        summary:
          $ref: "#/components/schemas/PlatformHealthSummary"
        metrics:
          oneOf:
            - $ref: "#/components/schemas/PlatformMetrics"
            - type: "null"
        services:
          type: array
          items:
            $ref: "#/components/schemas/ServiceHealth"
        apiErrors:
          type: array
          items:
            $ref: "#/components/schemas/ApiErrorLogEntry"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/PlatformActivityEntry"

    # ─── Enums (as strings, validated on server) ────────────────
    BusinessType:
      type: string
      enum:
        - FOOD_VENDOR
        - FLORIST
        - GARDEN_MARKET
        - RETAIL_STORE
        - BUILDING_SUPPLY
        - SERVICE_PROVIDER
        - FUNERAL_SERVICE
        - GENERAL
        - SALON

    StorefrontMode:
      type: string
      enum:
        - ORDERING
        - APPOINTMENT
        - INFORMATION
      description: ORDERING shows cart/checkout; APPOINTMENT prioritizes booking requests; INFORMATION shows menu/products without online ordering.

    OrderStatus:
      type: string
      enum:
        - NEW
        - CONFIRMED
        - PREPARING
        - READY_FOR_PICKUP
        - OUT_FOR_DELIVERY
        - COMPLETED
        - CANCELED

    FulfillmentType:
      type: string
      enum:
        - PICKUP
        - DELIVERY

    UserRole:
      type: string
      enum:
        - CUSTOMER
        - BUSINESS_OWNER
        - ADMIN

    PaymentMode:
      type: string
      enum:
        - ONLINE_ONLY
        - PAY_AT_PICKUP_ONLY
        - BOTH

    StripeConnectPaymentStatus:
      type: string
      enum:
        - not_connected
        - pending
        - connected
        - restricted

    StripeConnectStatus:
      type: object
      required:
        - paymentStatus
        - chargesEnabled
        - payoutsEnabled
        - detailsSubmitted
        - requirementsCurrentlyDueCount
        - mode
        - onlinePaymentsAvailable
      properties:
        paymentStatus:
          $ref: "#/components/schemas/StripeConnectPaymentStatus"
        connectedAccountId:
          type: ["string", "null"]
          description: Masked connected account identifier when present.
