openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LocalOrderHub - Multi-tenant local marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: businesses
    description: Business directory operations
  - name: products
    description: Product catalog operations
  - name: categories
    description: Category management
  - name: orders
    description: Order management
  - name: cart
    description: Cart operations
  - name: auth
    description: Authentication / user profile
  - name: admin
    description: Platform admin operations
  - name: events
    description: Community events calendar
  - name: highlights
    description: Seasonal highlights and promotions
  - name: subscriptions
    description: Subscription plans and billing
  - name: food-truck
    description: Food truck location management
  - name: media
    description: Media library and image uploads

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth / User ───────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      parameters:
        - in: query
          name: businessId
          schema:
            type: integer
          description: Selected owned business id (must belong to the current user)
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /auth/me/businesses:
    get:
      operationId: listMyBusinesses
      tags: [auth]
      summary: List businesses owned by the current user
      responses:
        "200":
          description: Owned businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OwnedBusinessSummary"
        "401":
          description: Unauthorized

  /auth/me/business:
    get:
      operationId: getMyBusiness
      tags: [auth]
      summary: Get an owned business for the current user
      parameters:
        - in: query
          name: businessId
          schema:
            type: integer
          description: Owned business id (defaults to primary owned business)
      responses:
        "200":
          description: My business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "403":
          description: Forbidden
        "404":
          description: No business found

  /admin/bootstrap-status:
    get:
      operationId: getAdminBootstrapStatus
      tags: [admin]
      summary: Check whether initial admin bootstrap is complete
      description: Public endpoint used by the frontend to hide the first-run setup flow after an admin exists.
      responses:
        "200":
          description: Bootstrap status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBootstrapStatus"

  /admin/bootstrap:
    post:
      operationId: bootstrapAdmin
      tags: [admin]
      summary: Promote the signed-in user to platform admin (first deploy only)
      responses:
        "200":
          description: Admin access granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBootstrapResult"
        "401":
          description: Unauthorized
        "403":
          description: Setup is locked — an admin already exists

  # ─── Businesses (public) ────────────────────────────────────────
  /businesses:
    get:
      operationId: listBusinesses
      tags: [businesses]
      summary: List all active businesses
      parameters:
        - in: query
          name: type
          schema:
            type: string
          description: Filter by business type
        - in: query
          name: search
          schema:
            type: string
          description: Search by business name
        - in: query
          name: featured
          schema:
            type: boolean
          description: Filter featured businesses only
      responses:
        "200":
          description: List of businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  /businesses/stats:
    get:
      operationId: getPlatformStats
      tags: [businesses]
      summary: Platform-level stats (admin)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /marketplace/stats:
    get:
      operationId: getMarketplaceStats
      tags: [businesses]
      summary: Public marketplace stats for homepage
      responses:
        "200":
          description: Marketplace stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceStats"

  /businesses/slug-availability:
    get:
      operationId: checkBusinessSlugAvailability
      tags: [businesses]
      summary: Check whether a storefront URL is available (public)
      parameters:
        - in: query
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Storefront URL availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessSlugAvailability"
        "400":
          description: Invalid slug

  /businesses/checkout/{businessId}:
    get:
      operationId: getBusinessCheckout
      tags: [businesses]
      summary: Public business checkout context (no auth)
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business checkout details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "404":
          description: Not found

  /businesses/{slug}:
    get:
      operationId: getBusinessBySlug
      tags: [businesses]
      summary: Get a single business storefront by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Business storefront
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessStorefront"
        "404":
          description: Not found

  # ─── Self-service business registration ────────────────────────
  /businesses/register:
    post:
      operationId: registerBusiness
      tags: [businesses]
      summary: Self-service business registration (any authenticated user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessRegistrationInput"
      responses:
        "201":
          description: Business created and user promoted to BUSINESS_OWNER
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  # ─── Business Admin (owner/admin) ──────────────────────────────
  /businesses/manage:
    post:
      operationId: createBusiness
      tags: [businesses]
      summary: Create a new business (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /businesses/manage/{id}:
    get:
      operationId: getBusiness
      tags: [businesses]
      summary: Get a business by id (owner or admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    patch:
      operationId: updateBusiness
      tags: [businesses]
      summary: Update business settings
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessUpdate"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    delete:
      operationId: deleteBusiness
      tags: [businesses]
      summary: Archive/remove a business (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveBusinessResponse"
        "404":
          description: Business not found
        "502":
          description: Stripe subscription cancellation failed

  # ─── Categories ─────────────────────────────────────────────────
  /businesses/{businessId}/categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories for a business
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /businesses/{businessId}/categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Modifier Groups ─────────────────────────────────────────────
  /businesses/{businessId}/modifier-groups:
    get:
      operationId: listModifierGroups
      tags: [modifier-groups]
      summary: List modifier groups for a business
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Modifier groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModifierGroup"
    post:
      operationId: createModifierGroup
      tags: [modifier-groups]
      summary: Create a modifier group
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifierGroupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifierGroup"

  /businesses/{businessId}/modifier-groups/{id}:
    patch:
      operationId: updateModifierGroup
      tags: [modifier-groups]
      summary: Update a modifier group
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModifierGroupUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifierGroup"
    delete:
      operationId: deleteModifierGroup
      tags: [modifier-groups]
      summary: Delete a modifier group
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Products ───────────────────────────────────────────────────
  /businesses/{businessId}/products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products for a business
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /businesses/{businessId}/products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Orders ─────────────────────────────────────────────────────
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /me/orders:
    get:
      operationId: listMyOrders
      tags: [orders]
      summary: List orders for the signed-in customer
      responses:
        "200":
          description: Customer order history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /businesses/{businessId}/orders:
    get:
      operationId: listBusinessOrders
      tags: [orders]
      summary: List orders for a specific business
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /businesses/{businessId}/orders/summary:
    get:
      operationId: getBusinessOrderSummary
      tags: [orders]
      summary: Get today's order summary/stats for a business
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessOrderSummary"

  /admin/orders:
    get:
      operationId: listAllOrders
      tags: [admin]
      summary: List all orders (admin)
      parameters:
        - in: query
          name: businessId
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: date
          schema:
            type: string
            format: date
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  # ─── Checkout / Stripe ──────────────────────────────────────────
  /checkout/session:
    post:
      operationId: createCheckoutSession
      tags: [orders]
      summary: Create a Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutSessionInput"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResult"

  /checkout/webhook:
    post:
      operationId: stripeWebhook
      tags: [orders]
      summary: Stripe webhook handler
      responses:
        "200":
          description: Received

  /businesses/{businessId}/stripe/status:
    get:
      operationId: getBusinessStripeStatus
      tags: [businesses]
      summary: Stripe Connect status for a business (owner or admin)
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stripe Connect status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectStatus"

  /businesses/{businessId}/stripe/connect/start:
    post:
      operationId: startBusinessStripeConnect
      tags: [businesses]
      summary: Start or resume Stripe Connect onboarding for a business
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeConnectStartInput"
      responses:
        "200":
          description: Stripe onboarding or dashboard redirect URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeConnectStartResult"

  # ─── Appointment Requests (Salon) ───────────────────────────────
  /appointment-requests:
    post:
      operationId: createAppointmentRequest
      tags: [appointments]
      summary: Submit a salon appointment request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentRequestInput"
      responses:
        "201":
          description: Appointment request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentRequest"

  /businesses/{businessId}/appointment-requests:
    get:
      operationId: listBusinessAppointmentRequests
      tags: [appointments]
      summary: List appointment requests for a business (owner)
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentRequest"
        "403":
          description: Forbidden
    post:
      operationId: createBusinessAppointmentRequest
      tags: [appointments]
      summary: Manually add an appointment (owner — phone or walk-in)
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OwnerAppointmentRequestInput"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentRequest"
        "403":
          description: Forbidden

  /businesses/{businessId}/appointment-requests/{id}:
    patch:
      operationId: updateBusinessAppointmentRequestStatus
      tags: [appointments]
      summary: Confirm, decline, cancel, or complete an appointment request
      parameters:
        - in: path
          name: businessId
          required: true
          schema:
            type: integer
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentRequestStatusUpdate"
      responses:
        "200":
          description: Updated appointment request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentRequest"
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Invalid status transition

  # ─── Admin: System Health ───────────────────────────────────────
  /admin/system/health:
    get:
      operationId: getAdminSystemHealth
      tags: [admin]
      summary: Detailed system health (admin only)
      responses:
        "200":
          description: System health report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemHealthReport"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "503":
          description: Deprecated — health reports are returned with HTTP 200 even when degraded

  # ─── Admin: Users ───────────────────────────────────────────────
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /admin/users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Update a user role (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /admin/businesses/{id}/assign-owner:
    patch:
      operationId: assignBusinessOwner
      tags: [admin]
      summary: Assign a business owner (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessOwnerAssignment"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  # ─── Events ────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List active events
      parameters:
        - in: query
          name: featured
          schema:
            type: boolean
        - in: query
          name: upcoming
          schema:
            type: boolean
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
