    # ─── Enums (as strings, validated on server) ────────────────
    BusinessType:
      type: string
      enum:
        - FOOD_VENDOR
        - FLORIST
        - GARDEN_MARKET
        - RETAIL_STORE
        - BUILDING_SUPPLY
        - SERVICE_PROVIDER
        - FUNERAL_SERVICE
        - GENERAL
        - SALON

