name: Production database backup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

concurrency:
  group: production-db-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Dump production PostgreSQL to Cloudflare R2
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.CF_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_SECRET_ACCESS_KEY }}
      CF_BUCKET_NAME: ${{ secrets.CF_BUCKET_NAME }}
      CF_BUCKET_ENDPOINT: ${{ secrets.CF_BUCKET_ENDPOINT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create and validate backup archive
        id: archive
        shell: bash
        run: |
          set -Eeuo pipefail
          test -n "$SUPABASE_DB_URL"
          test -n "$AWS_ACCESS_KEY_ID"
          test -n "$AWS_SECRET_ACCESS_KEY"
          test -n "$CF_BUCKET_NAME"
          test -n "$CF_BUCKET_ENDPOINT"

          # The Supabase CLI rejects pooler URIs copied with no-verify.
          # Normalize that query value while keeping TLS enabled.
          DB_URL="${SUPABASE_DB_URL//sslmode=no-verify/sslmode=require}"

          work_dir="$(mktemp -d)"
          trap 'rm -rf "$work_dir"' EXIT

          supabase db dump --db-url "$DB_URL" \
            --role-only -f "$work_dir/roles.sql"
          supabase db dump --db-url "$DB_URL" \
            -f "$work_dir/schema.sql"
          supabase db dump --db-url "$DB_URL" \
            --data-only --use-copy -f "$work_dir/data.sql"

          archive="townhub-production-$(date -u +%Y-%m-%dT%H-%M-%SZ).zip"
          (cd "$work_dir" && zip -q -9 "$GITHUB_WORKSPACE/$archive" roles.sql schema.sql data.sql)
          unzip -tq "$archive"
          test "$(stat -c '%s' "$archive")" -gt 0
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload archive to Cloudflare R2
        shell: bash
        env:
          ARCHIVE: ${{ steps.archive.outputs.archive }}
        run: |
          set -Eeuo pipefail
          aws s3 cp "$ARCHIVE" \
            "s3://$CF_BUCKET_NAME/$ARCHIVE" \
            --endpoint-url "$CF_BUCKET_ENDPOINT" \
            --no-progress
          aws s3api head-object \
            --bucket "$CF_BUCKET_NAME" \
            --key "$ARCHIVE" \
            --endpoint-url "$CF_BUCKET_ENDPOINT" >/dev/null

      - name: Remove local archive
        if: ${{ always() }}
        shell: bash
        env:
          ARCHIVE: ${{ steps.archive.outputs.archive }}
        run: |
          if [ -n "$ARCHIVE" ]; then
            rm -f -- "$ARCHIVE"
          fi
