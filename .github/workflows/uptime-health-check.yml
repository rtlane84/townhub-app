name: External uptime health checks

# Lightweight external monitors independent of Railway/Cloudflare app hosts.
# Complements (does not replace) Better Stack / UptimeRobot alert routing.

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: external-uptime-health
  cancel-in-progress: true

jobs:
  health:
    name: Check staging and production surfaces
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - url: https://api.townhub.io/health
            expect_json_ok: "true"
            label: production-api
          - url: https://api-staging.townhub.io/health
            expect_json_ok: "true"
            label: staging-api
          - url: https://townhub.io/
            expect_json_ok: "false"
            label: production-frontend
          - url: https://staging.townhub.io/
            expect_json_ok: "false"
            label: staging-frontend
    steps:
      - name: Probe URL
        id: probe
        shell: bash
        env:
          TARGET_URL: ${{ matrix.url }}
          EXPECT_JSON_OK: ${{ matrix.expect_json_ok }}
        run: |
          set -Eeuo pipefail
          code="$(curl -sS -o /tmp/uptime-body -w '%{http_code}' \
            --connect-timeout 10 --max-time 20 \
            -A 'TownHub-Uptime/1.0' \
            "$TARGET_URL" || true)"
          echo "url=$TARGET_URL"
          echo "http_status=$code"
          echo "http_status=$code" >> "$GITHUB_OUTPUT"
          test "$code" = "200"
          if [ "$EXPECT_JSON_OK" = "true" ]; then
            python3 -c 'import json; d=json.load(open("/tmp/uptime-body")); assert d.get("status")=="ok", d; print("health_status=ok")'
          fi

  notify-on-failure:
    name: Open or bump uptime alert issue
    needs: health
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ensure open uptime alert issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'OPS-002: External uptime check failed';
            const body = [
              'Automated alert from `.github/workflows/uptime-health-check.yml`.',
              '',
              `Failed run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Probes cover production and staging API `/health` plus frontend origins.',
              'Acknowledge in this issue after investigating. Close when all four surfaces are healthy again.',
              '',
              'This GitHub issue complements (does not replace) Better Stack / UptimeRobot email/SMS routing.'
            ].join('\\n');
            const labels = ['ops', 'uptime'];
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime',
              per_page: 10,
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Another failure at ${new Date().toISOString()}\\n\\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              core.info(`Commented on existing issue #${existing.number}`);
              return;
            }
            // Create labels if missing is best-effort
            for (const name of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color: name === 'uptime' ? 'd73a4a' : '0e8a16',
                  });
                } catch (_) {}
              }
            }
            const { data: created } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });
            core.info(`Opened issue #${created.number}`);
